workflows:
  android-development-build:
    name: Android Development Build (APK)
    max_build_duration: 60
    instance_type: mac_mini_m1
    working_directory: frontend
    environment:
      node: 20
      java: 17
      groups:
        - ad_credentials # Add your Keystore/AdMob IDs in Codemagic UI if needed
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Expo Prebuild
        script: |
          npx expo prebuild --platform android --no-install
      - name: Build Android Debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - frontend/android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - dineshmahidev@gmail.com # Guessed based on username
        notify:
          success: true
          failure: true
