workflows:
  android-development-build:
    name: Android Development Build (APK)
    max_build_duration: 60
    instance_type: mac_mini_m2
    # working_directory: frontend # Removed top-level working_directory as it can lead to path resolution issues in some tools
    environment:
      node: 20
      java: 17
      # groups:
      #   - ad_credentials # Uncomment this once you've defined it in the Codemagic UI
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install
          npx expo install --fix
      - name: Expo Prebuild
        script: |
          cd frontend
          npm run prebuild -- --platform android
      - name: Build Android Debug APK
        script: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - frontend/android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - dineshmahidev@gmail.com
        notify:
          success: true
          failure: true

  android-release-build:
    name: Android Release Build (APK)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 20
      java: 17
      android_signing:
        - keystore_reference # Defined in Codemagic UI
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install
      - name: Expo Prebuild
        script: |
          cd frontend
          npm run prebuild -- --platform android
      - name: Build Android Release APK
        script: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - frontend/android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - dineshmahidev@gmail.com
        notify:
          success: true
          failure: true

