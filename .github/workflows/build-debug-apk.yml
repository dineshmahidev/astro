name: Build Debug APK
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🏗 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-cache: true
          token: ${{ secrets.expo }}

      - name: 📦 Install dependencies
        working-directory: frontend
        run: npm install

      - name: 🛠 Build APK Locally
        working-directory: frontend
        run: |
          npx eas-cli build --platform android --profile development --local --non-interactive --output=./app-debug.apk

      - name: 🔑 Print APK Fingerprint
        working-directory: frontend
        run: |
          keytool -printcert -jarfile app-debug.apk | grep -E "SHA1|SHA256"

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Astromind-Debug-APK
          path: frontend/app-debug.apk
